<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #c0392b;
  --red2: #e74c3c;
  --redf: rgba(192,57,43,0.08);
}

[data-theme="dark"] {
  --bg: #080808;
  --surface: #111111;
  --s2: #181818;
  --s3: #202020;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.13);
  --text: #f0ece4;
  --text2: #a09a94;
  --muted: #5a5652;
  --muted2: #7a7672;
  --shadow: rgba(0,0,0,0.6);
}

[data-theme="light"] {
  --bg: #f5f3f0;
  --surface: #ffffff;
  --s2: #f8f6f4;
  --s3: #eeece8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.15);
  --text: #1a1614;
  --text2: #6a6460;
  --muted: #aaa8a4;
  --muted2: #888480;
  --shadow: rgba(0,0,0,0.12);
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  transition: background 0.3s, color 0.3s;
}

body {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px 16px;
}

/* Grain */
[data-theme="dark"] body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0;
}

/* Ambient */
[data-theme="dark"] body::after {
  content: '';
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 700px; height: 700px;
  background: radial-gradient(ellipse, rgba(192,57,43,0.06) 0%, transparent 65%);
  pointer-events: none; z-index: 0;
}

  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 24px 64px var(--shadow);
  overflow: hidden;
  animation: appear 0.5s ease forwards;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}

@keyframes appear {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Top accent */
.card::before {
  content: '';
  display: block; height: 1px;
  background: linear-gradient(90deg, transparent, var(--red) 30%, var(--red2) 70%, transparent);
}

/* Header */
.card-header {
  padding: 16px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
  transition: border-color 0.3s;
}

.logo-icon {
  width: 42px; height: 42px;
  border: 1.5px solid rgba(192,57,43,0.4);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; background: var(--redf);
}

.header-title { flex: 1; }
.header-title h1 {
  font-family: 'Bebas Neue';
  font-size: 22px; letter-spacing: 5px;
  color: var(--text); line-height: 1;
  transition: color 0.3s;
}
.header-title p {
  font-size: 8px; letter-spacing: 2.5px;
  color: var(--muted2); text-transform: uppercase;
  margin-top: 3px; transition: color 0.3s;
}

/* Header controls */
.header-controls { display: flex; align-items: center; gap: 8px; }

/* Status */
.status-badge {
  display: flex; align-items: center; gap: 5px;
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  padding: 5px 10px; border-radius: 20px;
  transition: all 0.3s;
}
.status-badge.online { color: #4caf84; background: rgba(76,175,132,0.1); border: 1px solid rgba(76,175,132,0.2); }
.status-badge.offline { color: var(--muted2); background: var(--s2); border: 1px solid var(--border2); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; }
.status-badge.online .status-dot { background: #4caf84; animation: pulse 2s ease infinite; }
.status-badge.offline .status-dot { background: var(--muted); }
@keyframes pulse { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }

/* Icon buttons */
.icon-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; color: var(--muted2);
}
.icon-btn:hover { border-color: var(--red); color: var(--red); background: var(--redf); }

/* Lang selector */
.lang-sel {
  display: flex; border: 1px solid var(--border2); border-radius: 8px; overflow: hidden;
}
.lang-btn {
  padding: 6px 9px; background: transparent; border: none;
  font-family: 'DM Mono'; font-size: 8px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted2); cursor: pointer;
  transition: all 0.2s; border-right: 1px solid var(--border2);
}
.lang-btn:last-child { border-right: none; }
.lang-btn:hover { background: var(--s2); color: var(--text); }
.lang-btn.active { background: var(--red); color: #fff; }

/* Body */
.card-body { padding: 24px 28px 28px; }

/* Field */
.field-label {
  font-size: 8px; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--muted2);
  margin-bottom: 8px; transition: color 0.3s;
}

.sfx-input {
  width: 100%; background: var(--s2);
  border: 1px solid var(--border2); border-radius: 12px;
  padding: 15px 18px; color: var(--text);
  font-family: 'DM Mono'; font-size: 14px;
  outline: none; transition: all 0.25s;
  caret-color: var(--red); margin-bottom: 14px;
}
.sfx-input:focus {
  border-color: var(--red);
  background: var(--redf);
  box-shadow: 0 0 0 4px rgba(192,57,43,0.06);
}
.sfx-input::placeholder { color: var(--muted); }
.sfx-input.shake { animation: shake 0.4s ease; }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-4px)} 40%,80%{transform:translateX(4px)} }

/* Controls row */
.controls-row {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 18px;
}

/* Duration */
.dur-group { display: flex; align-items: center; gap: 10px; flex: 1; }
.dur-label { font-size: 8px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); white-space: nowrap; }
input[type=range] {
  flex: 1; height: 2px; -webkit-appearance: none;
  background: var(--border2); border-radius: 1px; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 14px; height: 14px;
  border-radius: 50%; background: var(--red); cursor: pointer; transition: transform 0.15s;
}
input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.25); }
.dur-val {
  font-family: 'Bebas Neue'; font-size: 20px;
  color: var(--red); letter-spacing: 1px; width: 32px; text-align: right; flex-shrink: 0;
}

/* Variations */
.var-group { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.var-label { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); }
.var-pills { display: flex; gap: 4px; }
.var-pill {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid var(--border2); background: transparent;
  font-family: 'DM Mono'; font-size: 11px; color: var(--muted2);
  cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center;
}
.var-pill:hover { border-color: rgba(192,57,43,0.5); color: var(--red); }
.var-pill.active { background: var(--redf); border-color: rgba(192,57,43,0.6); color: var(--red); }

/* Generate button */
.btn-gen {
  width: 100%; padding: 15px;
  background: var(--red); border: none; border-radius: 12px;
  color: #fff; font-family: 'DM Mono';
  font-size: 11px; font-weight: 500;
  letter-spacing: 2.5px; text-transform: uppercase;
  cursor: pointer; transition: all 0.2s; margin-bottom: 22px;
}
.btn-gen:hover { background: var(--red2); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(192,57,43,0.25); }
.btn-gen:active { transform: translateY(0); box-shadow: none; }
.btn-gen:disabled {
  background: var(--s3); color: var(--muted2);
  border: 1px solid var(--border); cursor: not-allowed; transform: none; box-shadow: none;
}

/* Divider */
.divider { height: 1px; background: var(--border); margin-bottom: 18px; transition: background 0.3s; }

/* Output header */
.out-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.out-head-label { font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted2); }
.out-count { font-size: 8px; letter-spacing: 1px; color: var(--red); }

/* Output list */
.out-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }
.out-list::-webkit-scrollbar { width: 2px; }
.out-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 1px; }

/* Empty */
.empty { padding: 28px 0 6px; text-align: center; color: var(--muted); }
.empty svg { opacity: 0.2; margin-bottom: 10px; }
.empty p { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 13px; color: var(--muted2); }

/* Single item */
.single-item {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; display: flex; align-items: center;
  gap: 12px; padding: 11px 14px;
  animation: itemIn 0.3s ease forwards; transition: border-color 0.2s;
}
.single-item:hover { border-color: var(--border2); }

/* Variation group */
.var-group-items {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 11px; overflow: hidden;
  animation: itemIn 0.3s ease forwards;
}
.var-group-label {
  padding: 9px 14px 7px; font-size: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--muted2);
  border-bottom: 1px solid var(--border);
}
.var-group-label span { color: var(--red); }
.var-item {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-bottom: 1px solid var(--border);
  transition: background 0.2s;
}
.var-item:last-child { border-bottom: none; }
.var-item:hover { background: rgba(255,255,255,0.02); }

@keyframes itemIn { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:translateY(0)} }

/* Play button */
.play-btn {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid var(--border2); background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.2s; flex-shrink: 0; color: var(--muted2);
}
.play-btn:hover { border-color: var(--red); color: var(--red); background: var(--redf); }
.play-btn.playing { border-color: var(--red); color: var(--red); background: var(--redf); }
.play-btn:disabled { opacity: 0.3; cursor: not-allowed; }

/* Item info */
.item-info { flex: 1; min-width: 0; }
.item-name { font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; transition: color 0.3s; }
.item-meta { font-size: 9px; color: var(--muted2); transition: color 0.3s; }

/* Waveform */
.item-wave { display: flex; align-items: center; gap: 1.5px; height: 20px; flex-shrink: 0; width: 40px; }
.item-wave span { width: 2px; background: var(--red); border-radius: 1px; opacity: 0.3; transition: height 0.1s, opacity 0.1s; }

/* Badge */
.badge { font-size: 8px; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; letter-spacing: 0.3px; }
.badge-ok { background: rgba(76,175,132,0.1); color: #4caf84; border: 1px solid rgba(76,175,132,0.2); }
.badge-loading { background: var(--redf); color: var(--red); border: 1px solid rgba(192,57,43,0.2); animation: blink 1s infinite; }
.badge-erro { background: rgba(224,58,58,0.08); color: #e74c3c; border: 1px solid rgba(224,58,58,0.2); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface); border: 1px solid rgba(192,57,43,0.3);
  color: var(--red); font-size: 10px; padding: 10px 20px;
  border-radius: 8px; transition: transform 0.3s ease;
  z-index: 999; white-space: nowrap; letter-spacing: 0.3px;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Mobile ──────────────────────────────────────────────────── */
@media (max-width: 600px) {
  body { padding: 0; align-items: flex-end; }

  .card {
    max-width: 100%;
    border-radius: 24px 24px 0 0;
    border-bottom: none;
    min-height: 92vh;
    display: flex; flex-direction: column;
  }

  .card-header {
    padding: 20px 20px 16px;
    flex-wrap: wrap; gap: 10px;
  }

  .header-controls {
    gap: 6px;
    flex-wrap: nowrap;
  }

  .lang-sel { display: none; }

  /* Lang dropdown for mobile */
  .lang-mobile {
    display: flex !important;
    border: 1px solid var(--border2); border-radius: 8px; overflow: hidden;
  }

  .card-body {
    padding: 20px 20px 32px;
    flex: 1; display: flex; flex-direction: column;
  }

  .sfx-input {
    font-size: 16px; /* Prevents iOS zoom */
    padding: 16px 16px;
  }

  .controls-row {
    flex-direction: column;
    align-items: stretch;
    gap: 14px;
  }

  .dur-group { width: 100%; }

  .var-group {
    justify-content: space-between;
    width: 100%;
  }

  .var-pills { gap: 6px; }

  .var-pill {
    width: 36px; height: 36px;
    border-radius: 9px; font-size: 12px;
  }

  .btn-gen {
    padding: 18px;
    font-size: 12px;
    margin-bottom: 20px;
  }

  .out-list {
    max-height: none;
    flex: 1;
  }

  .single-item, .var-item { padding: 12px 12px; }

  .item-wave { width: 32px; }
  .item-wave span { width: 2px; }

  .play-btn { width: 36px; height: 36px; }

  .toast {
    bottom: 32px;
    font-size: 11px;
    max-width: calc(100vw - 32px);
    white-space: normal;
    text-align: center;
  }
}

@media (max-width: 380px) {
  .header-title h1 { font-size: 18px; letter-spacing: 4px; }
  .status-badge { display: none; }
}
</style>

        <span class="var-label" data-i18n="variations">Variações</span>
        <div class="var-pills">
          <button class="var-pill active" data-v="1" onclick="setVar(this)">1</button>
          <button class="var-pill" data-v="2" onclick="setVar(this)">2</button>
          <button class="var-pill" data-v="3" onclick="setVar(this)">3</button>
        </div>
      </div>
    </div>

    <button class="btn-gen" id="btnGen" onclick="gerar()" data-i18n="generate">Gerar som</button>

    <div class="divider"></div>

    <div class="out-head">
      <span class="out-head-label" data-i18n="generated">Gerados</span>
      <span class="out-count" id="outCount">—</span>
    </div>

    <div class="out-list" id="outList">
      <div class="empty" id="emptyState">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="14" stroke="currentColor" stroke-width="1.3"/>
          <path d="M13 18c0-2.76 2.24-5 5-5s5 2.24 5 5-2.24 5-5 5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <circle cx="18" cy="18" r="2" fill="currentColor"/>
        </svg>
        <p data-i18n="emptyMsg">Nenhum som gerado ainda</p>
      </div>
    </div>


    <!-- Footer -->
    <div style="margin-top:20px;padding-top:14px;border-top:1px solid var(--border);text-align:center;">
      <p style="font-size:8px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;line-height:1.8;">
        Software developed by <a href="https://instagram.com/braguerafilms" target="_blank" style="color:var(--red);text-decoration:none;letter-spacing:1px;">@braguerafilms</a>
        <span style="margin:0 8px;opacity:0.3;">·</span>
        All rights reserved &copy; 2025
      </p>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── i18n ──────────────────────────────────────────────────────────────
const STRINGS = {
  pt: {
    subtitle: 'Gerador de Efeitos Sonoros',
    fieldLabel: 'Descreve o som',
    duration: 'Duração',
    variations: 'Variações',
    generate: 'Gerar som',
    generateN: n => `Gerar ${n} variações`,
    generating: 'Gerando...',
    generatingN: n => `Gerando ${n} variações...`,
    generated: 'Gerados',
    emptyMsg: 'Nenhum som gerado ainda',
    online: 'online',
    offline: 'offline',
    waiting: 'aguardando...',
    errOffline: 'Servidor offline. Rode: python3 server.py',
    errAudio: 'Erro ao tocar áudio',
  },
  en: {
    subtitle: 'Sound Effects Generator',
    fieldLabel: 'Describe the sound',
    duration: 'Duration',
    variations: 'Variations',
    generate: 'Generate',
    generateN: n => `Generate ${n} variations`,
    generating: 'Generating...',
    generatingN: n => `Generating ${n} variations...`,
    generated: 'Generated',
    emptyMsg: 'No sounds generated yet',
    online: 'online',
    offline: 'offline',
    waiting: 'waiting...',
    errOffline: 'Server offline. Run: python3 server.py',
    errAudio: 'Error playing audio',
  },
  es: {
    subtitle: 'Generador de Efectos de Sonido',
    fieldLabel: 'Describe el sonido',
    duration: 'Duración',
    variations: 'Variaciones',
    generate: 'Generar',
    generateN: n => `Generar ${n} variaciones`,
    generating: 'Generando...',
    generatingN: n => `Generando ${n} variaciones...`,
    generated: 'Generados',
    emptyMsg: 'Ningún sonido generado aún',
    online: 'en línea',
    offline: 'sin conexión',
    waiting: 'esperando...',
    errOffline: 'Servidor offline. Ejecuta: python3 server.py',
    errAudio: 'Error al reproducir audio',
  }
};

let lang = 'pt';

function setLang(l) {
  lang = l;
  document.documentElement.setAttribute('data-lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === l));
  const s = STRINGS[l];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (s[key] && typeof s[key] === 'string') el.textContent = s[key];
  });
  const input = document.getElementById('sfxInput');
  input.placeholder = input.dataset['placeholder' + l.charAt(0).toUpperCase() + l.slice(1)] || '';
  updateBtnText();
}

function updateBtnText() {
  const s = STRINGS[lang];
  const btn = document.getElementById('btnGen');
  if (!btn.disabled) {
    btn.textContent = variations === 1 ? s.generate : s.generateN(variations);
  }
}

// ── Theme ─────────────────────────────────────────────────────────────
let theme = 'dark';

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', theme);
  const icon = document.getElementById('themeIcon');
  if (theme === 'light') {
    icon.innerHTML = `<path d="M7 2a5 5 0 1 0 0 10A5 5 0 0 0 7 2z" fill="currentColor" opacity=".15" stroke="currentColor" stroke-width="1.2"/><path d="M11 7a4 4 0 1 1-8 0" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>`;
  } else {
    icon.innerHTML = `<circle cx="7" cy="7" r="3" stroke="currentColor" stroke-width="1.3"/><path d="M7 1v1.5M7 11.5V13M1 7h1.5M11.5 7H13M2.5 2.5l1 1M10.5 10.5l1 1M2.5 11.5l1-1M10.5 3.5l1-1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>`;
  }
}

// ── Server status ──────────────────────────────────────────────────────
async function checkStatus() {
  try {
    await fetch('/gerar', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({descricao:'_check_', duracao:0.5}) });
    const badge = document.getElementById('statusBadge');
    badge.className = 'status-badge online';
    document.getElementById('statusText').textContent = STRINGS[lang].online;
  } catch {
    document.getElementById('statusBadge').className = 'status-badge offline';
    document.getElementById('statusText').textContent = STRINGS[lang].offline;
  }
}
checkStatus();
setInterval(checkStatus, 5000);

// ── Controls ───────────────────────────────────────────────────────────
let variations = 1;

function updateDur() {
  document.getElementById('durVal').textContent = document.getElementById('durSlider').value + 's';
}

function setVar(el) {
  document.querySelectorAll('.var-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  variations = parseInt(el.dataset.v);
  updateBtnText();
}

// ── Audio ──────────────────────────────────────────────────────────────
let currentAudio = null, currentBtn = null, waveInterval = null;

function makeWave() {
  return Array.from({length: 13}, () => { const h = 3 + Math.random()*15; return `<span style="height:${h}px"></span>`; }).join('');
}

function animateWave(el) {
  return setInterval(() => {
    Array.from(el.children).forEach(b => { const h = 3 + Math.random()*15; b.style.height = h+'px'; b.style.opacity = 0.3 + h/18*0.7; });
  }, 120);
}

function stopCurrent() {
  if (currentAudio) { currentAudio.pause(); currentAudio.currentTime = 0; currentAudio = null; }
  if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn.innerHTML = playIcon(); currentBtn = null; }
  if (waveInterval) { clearInterval(waveInterval); waveInterval = null; }
}

const playIcon = () => `<svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><path d="M1.5 1l6 3.5-6 3.5V1z"/></svg>`;
const pauseIcon = () => `<svg width="9" height="9" viewBox="0 0 9 9" fill="currentColor"><rect x="1" y="1" width="2.5" height="7" rx=".5"/><rect x="5.5" y="1" width="2.5" height="7" rx=".5"/></svg>`;

function togglePlay(btn, url, waveEl) {
  if (currentBtn === btn) { stopCurrent(); return; }
  stopCurrent();
  const audio = new Audio(url);
  currentAudio = audio; currentBtn = btn;
  btn.classList.add('playing'); btn.innerHTML = pauseIcon();
  waveInterval = animateWave(waveEl);
  audio.play().catch(() => { showToast(STRINGS[lang].errAudio); stopCurrent(); });
  audio.onended = () => stopCurrent();
}

// ── Toast ──────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

// ── Generate ───────────────────────────────────────────────────────────
let totalSounds = 0;

function slug(d) { return d.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,''); }

async function gerar() {
  const input = document.getElementById('sfxInput');
  const desc = input.value.trim();
  if (!desc) { input.classList.add('shake'); setTimeout(() => input.classList.remove('shake'), 400); input.focus(); return; }

  const dur = parseFloat(document.getElementById('durSlider').value);
  const btn = document.getElementById('btnGen');
  const list = document.getElementById('outList');
  const s = STRINGS[lang];

  document.getElementById('emptyState')?.remove();
  btn.disabled = true;
  btn.textContent = variations === 1 ? s.generating : s.generatingN(variations);

  let groupEl = null;
  if (variations > 1) {
    groupEl = document.createElement('div');
    groupEl.className = 'var-group-items';
    groupEl.innerHTML = `<div class="var-group-label">${desc} — <span>${variations} var.</span></div>`;
    list.insertBefore(groupEl, list.firstChild);
  }

  const promises = Array.from({length: variations}, (_, i) => generateOne(desc, dur, i+1, variations, groupEl, list));
  const results = await Promise.all(promises);
  totalSounds += results.filter(Boolean).length;
  document.getElementById('outCount').textContent = totalSounds + (totalSounds === 1 ? ' som' : ' sons');

  btn.disabled = false;
  updateBtnText();
  input.value = ''; input.focus();
}

async function generateOne(desc, dur, varNum, totalVars, groupEl, list) {
  const s = STRINGS[lang];
  const name = slug(desc) + (totalVars > 1 ? `_v${varNum}` : '') + '.wav';
  const item = document.createElement('div');
  item.className = totalVars > 1 ? 'var-item' : 'single-item';
  item.innerHTML = `
    <button class="play-btn" disabled>${playIcon()}</button>
    <div class="item-info">
      <div class="item-name">${name}</div>
      <div class="item-meta">${dur}s · ${s.waiting}</div>
    </div>
    <div class="item-wave">${makeWave()}</div>
    <span class="badge badge-loading">${totalVars > 1 ? `v${varNum}` : '...'}</span>
  `;
  if (totalVars > 1) groupEl.appendChild(item);
  else list.insertBefore(item, list.firstChild);

  try {
    const res = await fetch('/gerar', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ descricao: desc, duracao: dur, variacao: varNum })
    });
    const data = await res.json();

    if (!res.ok || data.erro) {
      item.querySelector('.badge').className = 'badge badge-erro';
      item.querySelector('.badge').textContent = '✗';
      item.querySelector('.item-meta').textContent = data.erro || 'Erro';
      return false;
    }

    const waveEl = item.querySelector('.item-wave');
    const playBtn = item.querySelector('.play-btn');
    playBtn.disabled = false;
    playBtn.onclick = () => togglePlay(playBtn, data.url, waveEl);
    item.querySelector('.item-name').textContent = data.arquivo;
    item.querySelector('.item-meta').textContent = `${data.duracao}s · ${data.tamanho_kb || '?'} KB`;
    item.querySelector('.badge').className = 'badge badge-ok';
    item.querySelector('.badge').textContent = totalVars > 1 ? `v${varNum}` : '✓';
    if (varNum === 1) setTimeout(() => togglePlay(playBtn, data.url, waveEl), 300);
    return true;
  } catch {
    item.querySelector('.badge').className = 'badge badge-erro';
    item.querySelector('.badge').textContent = '✗';
    item.querySelector('.item-meta').textContent = s.errOffline;
    showToast(s.errOffline);
    return false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────
setLang('pt');
document.getElementById('sfxInput').addEventListener('keydown', e => { if (e.key === 'Enter') gerar(); });
</script>
</body>
</html>
